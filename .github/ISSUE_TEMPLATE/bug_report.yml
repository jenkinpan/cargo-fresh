name: Bug report
description: cargo-fresh misbehaves, crashes, or reports a false-positive update
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! To speed up triage, please give a minimal reproducer
        plus expected and actual output. For "should I upgrade X?" questions, Discussions
        is a better fit.

  - type: input
    id: version
    attributes:
      label: cargo-fresh version
      description: Output of `cargo fresh --version`
      placeholder: cargo-fresh 0.10.0
    validations:
      required: true

  - type: input
    id: rustc
    attributes:
      label: rustc / cargo version
      description: Output of `rustc -V && cargo -V`
      placeholder: rustc 1.82.0 / cargo 1.82.0
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: macOS 15.2 / Ubuntu 24.04 / Windows 11
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command line, plus any relevant env vars (HTTPS_PROXY, CARGO_HOME, mirror config, etc.)
      placeholder: |
        1. `cargo fresh --include-prerelease --filter "tokio*"`
        2. Pick tokio-console
        3. Update hangs at ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Paste the full stderr/stdout. Re-run with `--verbose` for more detail.
      render: shell

  - type: checkboxes
    id: triage
    attributes:
      label: Self-check
      options:
        - label: I confirmed cargo is available via `cargo --version`
        - label: I tried `--verbose` and inspected the detailed output
        - label: I searched existing issues and did not find a duplicate
