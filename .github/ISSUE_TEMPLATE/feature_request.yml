name: Feature request
description: 建议新功能或行为改进
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        在提之前，请先看 `ROADMAP.md` —— 你想要的可能已经被规划或刻意排除。
        如果是 1.0 之前的 BREAKING change，请说明。

  - type: textarea
    id: problem
    attributes:
      label: 你在解决什么问题？
      description: 与其描述方案，不如先把用户场景讲清楚。"我每周要手动跑 X 次"比"加个 --watch flag"更有帮助。
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: 建议的方案
      description: 命令行形态 / 行为变化 / 输出示例

  - type: textarea
    id: alternatives
    attributes:
      label: 考虑过的替代方案
      description: 现有工具能否满足？已有 flag 组合能否凑出？

  - type: dropdown
    id: breaking
    attributes:
      label: 这是 BREAKING change 吗？
      options:
        - 不是（纯增量）
        - 是（行为/输出格式变化）
        - 不确定
    validations:
      required: true
