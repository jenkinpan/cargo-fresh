name: Feature request
description: Propose a new feature or behavior change
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Before filing, please skim `ROADMAP.md` — what you want may already be planned
        or intentionally out of scope. If this proposes a BREAKING change before 1.0,
        please call that out.

  - type: textarea
    id: problem
    attributes:
      label: What problem are you solving?
      description: Describe the user scenario, not the solution. "I manually run X every week" is more useful than "add a --watch flag".
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: CLI shape, behavior change, example output

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Can existing tools or flag combinations cover this?

  - type: dropdown
    id: breaking
    attributes:
      label: Is this a BREAKING change?
      options:
        - "No (purely additive)"
        - "Yes (behavior / output format change)"
        - "Not sure"
    validations:
      required: true
