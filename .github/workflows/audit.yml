name: Security audit

on:
  push:
    branches: [master]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  pull_request:
    branches: [master]
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - "deny.toml"
      - ".github/workflows/audit.yml"
  schedule:
    # 每周一 06:00 UTC — 即使没人推代码，新出现的 RustSec 公告也会触发一次
    - cron: "0 6 * * 1"

permissions:
  contents: read

jobs:
  cargo-deny:
    name: cargo-deny (advisories / licenses / sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # 显式列出，CI 输出更可读；任何一个 fail 就让作业红
          command: check advisories licenses sources bans

  cargo-audit:
    name: cargo-audit (Cargo.lock vs RustSec DB)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: audit
      # 直接跑 cargo-audit CLI,而非 rustsec/audit-check action——后者最新发布版仍声明
      # node20,无 node24 tag 可用,会持续报 GitHub runtime 弃用注解。CLI 自包含、无第三方
      # Node action 依赖,Cargo.lock 改动时本作业才触发,装一次开销可接受。
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - name: Run cargo-audit
        run: cargo audit
